<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías — Librería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div class="wrapper">
  <aside class="sidebar" id="sidebar-container"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar-container"></header>
    <main class="page-content">
      <div class="page-header">
        <h1><i class="bi bi-tags me-2 text-primary"></i>Categorías</h1>
        <button class="btn btn-primary" id="btn-nuevo"><i class="bi bi-plus-lg me-1"></i>Nueva Categoría</button>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Total libros</th><th>Acciones</th></tr>
              </thead>
              <tbody id="tabla-categorias">
                <tr><td colspan="5" class="text-center py-4 text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api, showToast, showSpinner, hideSpinner, confirmDelete } from '/js/utils.js';
import { renderSidebar } from '/js/components/sidebar.js';
import { renderNavbar } from '/js/components/navbar.js';
import Validators from '/js/validators.js';
import CategoriaService from '/js/services/categoriaService.js';

let usuario = null;

(async () => {
  try {
    const res = await api('/api/auth/me');
    if (res && res.data) { usuario = res.data; sessionStorage.setItem('usuario', JSON.stringify(usuario)); }
  } catch(_) { window.location.href = '/index.html'; return; }
  renderSidebar(usuario);
  renderNavbar('Categorías', usuario);
  await cargar();
})();

async function cargar() {
  showSpinner();
  try {
    const res = await CategoriaService.listar();
    renderTabla(res.data || []);
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
}

function renderTabla(cats) {
  const tbody = document.getElementById('tabla-categorias');
  if (!cats.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><i class="bi bi-tags"></i>Sin categorías registradas</td></tr>';
    return;
  }
  tbody.innerHTML = cats.map(c => `
    <tr>
      <td>${c.id}</td>
      <td><strong>${c.nombre}</strong></td>
      <td class="text-muted">${c.descripcion || '-'}</td>
      <td><span class="badge bg-secondary">${c.totalLibros}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="editar(${c.id})"><i class="bi bi-pencil"></i></button>
        ${usuario && usuario.rol === 'ADMIN'
          ? `<button class="btn btn-sm btn-outline-danger" onclick="eliminar(${c.id}, '${c.nombre.replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button>` : ''}
      </td>
    </tr>`).join('');
}

document.getElementById('btn-nuevo').addEventListener('click', () => abrirModal(null));

window.editar = async (id) => {
  showSpinner();
  try {
    const res = await CategoriaService.buscarPorId(id);
    abrirModal(res.data);
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
};

window.eliminar = async (id, nombre) => {
  if (!await confirmDelete(nombre)) return;
  showSpinner();
  try {
    await CategoriaService.eliminar(id);
    showToast('Categoría eliminada');
    cargar();
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
};

function abrirModal(cat) {
  const modalId = 'modal-cat';
  const existing = document.getElementById(modalId);
  if (existing) existing.remove();

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal fade" id="${modalId}" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">${cat ? 'Editar Categoría' : 'Nueva Categoría'}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="form-cat" novalidate>
              <div class="mb-3">
                <label class="form-label">Nombre *</label>
                <input type="text" class="form-control" id="cat-nombre" value="${cat ? cat.nombre : ''}">
              </div>
              <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea class="form-control" id="cat-descripcion" rows="3">${cat ? (cat.descripcion || '') : ''}</textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btn-guardar-cat">Guardar</button>
          </div>
        </div>
      </div>
    </div>`);

  const modalEl = document.getElementById(modalId);
  const modal = new bootstrap.Modal(modalEl);
  modal.show();
  modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());

  document.getElementById('btn-guardar-cat').addEventListener('click', async () => {
    Validators.clearAllErrors('form-cat');
    const nombre = document.getElementById('cat-nombre').value;
    const { valid, errors } = Validators.validateForm({
      'cat-nombre': [{ type: 'required', value: nombre, message: 'Nombre obligatorio' }],
    });
    if (!valid) { Object.entries(errors).forEach(([f, m]) => Validators.showFieldError(f, m)); return; }

    const data = { nombre, descripcion: document.getElementById('cat-descripcion').value };
    showSpinner();
    try {
      if (cat) { await CategoriaService.actualizar(cat.id, data); showToast('Categoría actualizada'); }
      else { await CategoriaService.crear(data); showToast('Categoría creada'); }
      modal.hide();
      cargar();
    } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
  });
}
</script>
</body>
</html>
