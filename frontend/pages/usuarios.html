<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — Librería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div class="wrapper">
  <aside class="sidebar" id="sidebar-container"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar-container"></header>
    <main class="page-content">
      <div class="alert alert-info d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-shield-lock-fill"></i>
        <span>Solo visible para administradores</span>
      </div>
      <div class="page-header">
        <h1><i class="bi bi-people me-2 text-primary"></i>Usuarios</h1>
        <button class="btn btn-primary" id="btn-nuevo"><i class="bi bi-plus-lg me-1"></i>Nuevo Usuario</button>
      </div>
      <div class="card mb-3">
        <div class="card-body py-2">
          <div class="search-bar">
            <input type="text" class="form-control" id="input-busqueda" placeholder="Buscar por nombre...">
            <button class="btn btn-outline-secondary" id="btn-buscar"><i class="bi bi-search"></i></button>
            <button class="btn btn-outline-secondary" id="btn-limpiar">Limpiar</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr>
              </thead>
              <tbody id="tabla-usuarios">
                <tr><td colspan="6" class="text-center py-4 text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="mt-3 d-flex justify-content-center" id="paginacion"></div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api, showToast, showSpinner, hideSpinner, confirmDelete, renderPagination } from '/js/utils.js';
import { renderSidebar } from '/js/components/sidebar.js';
import { renderNavbar } from '/js/components/navbar.js';
import Validators from '/js/validators.js';
import UsuarioService from '/js/services/usuarioService.js';

let usuario = null;
let currentPage = 0;
let totalPages = 0;
let busqueda = '';

(async () => {
  try {
    const res = await api('/api/auth/me');
    if (res && res.data) { usuario = res.data; sessionStorage.setItem('usuario', JSON.stringify(usuario)); }
  } catch(_) { window.location.href = '/index.html'; return; }
  if (usuario.rol !== 'ADMIN') { window.location.href = '/pages/dashboard.html'; return; }
  renderSidebar(usuario);
  renderNavbar('Usuarios', usuario);
  await cargar();
})();

async function cargar(page = 0) {
  showSpinner();
  try {
    const params = { page, size: 10 };
    if (busqueda) params.busqueda = busqueda;
    const res = await UsuarioService.listar(params);
    const data = res.data;
    currentPage = data.number;
    totalPages = data.totalPages;
    renderTabla(data.content);
    renderPagination('paginacion', currentPage, totalPages, p => cargar(p));
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
}

function renderTabla(usuarios) {
  const tbody = document.getElementById('tabla-usuarios');
  if (!usuarios.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i class="bi bi-people"></i>Sin usuarios</td></tr>';
    return;
  }
  tbody.innerHTML = usuarios.map(u => `
    <tr>
      <td>${u.id}</td>
      <td><strong>${u.nombre} ${u.apellido}</strong></td>
      <td class="text-muted">${u.correo}</td>
      <td><span class="badge-${u.rol === 'ADMIN' ? 'admin' : 'empleado'}">${u.rol}</span></td>
      <td>
        <div class="form-check form-switch mb-0">
          <input class="form-check-input" type="checkbox" ${u.estado ? 'checked' : ''}
            onchange="toggleEstado(${u.id}, this.checked)" style="cursor:pointer;">
        </div>
      </td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="editar(${u.id})"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${u.id}, '${(u.nombre+' '+u.apellido).replace(/'/g,"\\'")}')">
          <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>`).join('');
}

document.getElementById('btn-buscar').addEventListener('click', () => { busqueda = document.getElementById('input-busqueda').value.trim(); cargar(0); });
document.getElementById('input-busqueda').addEventListener('keydown', e => { if (e.key === 'Enter') { busqueda = e.target.value.trim(); cargar(0); } });
document.getElementById('btn-limpiar').addEventListener('click', () => { busqueda = ''; document.getElementById('input-busqueda').value = ''; cargar(0); });
document.getElementById('btn-nuevo').addEventListener('click', () => abrirModal(null));

window.editar = async (id) => {
  showSpinner();
  try { const res = await UsuarioService.buscarPorId(id); abrirModal(res.data); }
  catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
};

window.eliminar = async (id, nombre) => {
  if (!await confirmDelete(nombre)) return;
  showSpinner();
  try { await UsuarioService.eliminar(id); showToast('Usuario eliminado'); cargar(currentPage); }
  catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
};

window.toggleEstado = async (id, estado) => {
  try { await UsuarioService.cambiarEstado(id, estado); showToast(estado ? 'Usuario activado' : 'Usuario desactivado'); }
  catch(err) { showToast(err.message, 'danger'); cargar(currentPage); }
};

function abrirModal(u) {
  const modalId = 'modal-usuario';
  const existing = document.getElementById(modalId);
  if (existing) existing.remove();

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal fade" id="${modalId}" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">${u ? 'Editar Usuario' : 'Nuevo Usuario'}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="form-usuario" novalidate>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nombre *</label>
                  <input type="text" class="form-control" id="usr-nombre" value="${u ? u.nombre : ''}">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Apellido *</label>
                  <input type="text" class="form-control" id="usr-apellido" value="${u ? u.apellido : ''}">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Correo *</label>
                  <input type="email" class="form-control" id="usr-correo" value="${u ? u.correo : ''}">
                </div>
                <div class="col-md-6">
                  <label class="form-label">${u ? 'Nueva contraseña (dejar vacío para no cambiar)' : 'Contraseña *'}</label>
                  <input type="password" class="form-control" id="usr-password">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Rol *</label>
                  <select class="form-select" id="usr-rol">
                    <option value="ADMIN" ${u && u.rol === 'ADMIN' ? 'selected' : ''}>ADMIN</option>
                    <option value="EMPLEADO" ${!u || u.rol === 'EMPLEADO' ? 'selected' : ''}>EMPLEADO</option>
                  </select>
                </div>
                <div class="col-md-6 d-flex align-items-end">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="usr-estado" ${!u || u.estado ? 'checked' : ''}>
                    <label class="form-check-label" for="usr-estado">Activo</label>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btn-guardar-usr">Guardar</button>
          </div>
        </div>
      </div>
    </div>`);

  const modalEl = document.getElementById(modalId);
  const modal = new bootstrap.Modal(modalEl);
  modal.show();
  modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());

  document.getElementById('btn-guardar-usr').addEventListener('click', async () => {
    Validators.clearAllErrors('form-usuario');
    const nombre = document.getElementById('usr-nombre').value;
    const apellido = document.getElementById('usr-apellido').value;
    const correo = document.getElementById('usr-correo').value;
    const password = document.getElementById('usr-password').value;

    const rules = {
      'usr-nombre': [{ type: 'required', value: nombre, message: 'Nombre obligatorio' }],
      'usr-apellido': [{ type: 'required', value: apellido, message: 'Apellido obligatorio' }],
      'usr-correo': [
        { type: 'required', value: correo, message: 'Correo obligatorio' },
        { type: 'email', value: correo, message: 'Correo inválido' }
      ],
    };
    if (!u) {
      rules['usr-password'] = [
        { type: 'required', value: password, message: 'Contraseña obligatoria' },
        { type: 'minLength', value: password, min: 6, message: 'Mínimo 6 caracteres' }
      ];
    }

    const { valid, errors } = Validators.validateForm(rules);
    if (!valid) { Object.entries(errors).forEach(([f, m]) => Validators.showFieldError(f, m)); return; }

    const data = {
      nombre, apellido, correo,
      password: password || (u ? '______' : ''),
      rol: document.getElementById('usr-rol').value,
      estado: document.getElementById('usr-estado').checked,
    };

    showSpinner();
    try {
      if (u) { await UsuarioService.actualizar(u.id, data); showToast('Usuario actualizado'); }
      else { await UsuarioService.crear(data); showToast('Usuario creado'); }
      modal.hide();
      cargar(currentPage);
    } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
  });
}
</script>
</body>
</html>
