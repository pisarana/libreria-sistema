<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autores — Librería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div class="wrapper">
  <aside class="sidebar" id="sidebar-container"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar-container"></header>
    <main class="page-content">
      <div class="page-header">
        <h1><i class="bi bi-person-lines-fill me-2 text-primary"></i>Autores</h1>
        <button class="btn btn-primary" id="btn-nuevo"><i class="bi bi-plus-lg me-1"></i>Nuevo Autor</button>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr><th>ID</th><th>Nombre completo</th><th>Nacionalidad</th><th>Total libros</th><th>Acciones</th></tr>
              </thead>
              <tbody id="tabla-autores">
                <tr><td colspan="5" class="text-center py-4 text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api, showToast, showSpinner, hideSpinner, confirmDelete } from '/js/utils.js';
import { renderSidebar } from '/js/components/sidebar.js';
import { renderNavbar } from '/js/components/navbar.js';
import Validators from '/js/validators.js';
import AutorService from '/js/services/autorService.js';

let usuario = null;

(async () => {
  try {
    const res = await api('/api/auth/me');
    if (res && res.data) { usuario = res.data; sessionStorage.setItem('usuario', JSON.stringify(usuario)); }
  } catch(_) { window.location.href = '/index.html'; return; }
  renderSidebar(usuario);
  renderNavbar('Autores', usuario);
  await cargar();
})();

async function cargar() {
  showSpinner();
  try {
    const res = await AutorService.listar();
    renderTabla(res.data || []);
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
}

function renderTabla(autores) {
  const tbody = document.getElementById('tabla-autores');
  if (!autores.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><i class="bi bi-person-lines-fill"></i>Sin autores registrados</td></tr>';
    return;
  }
  tbody.innerHTML = autores.map(a => `
    <tr>
      <td>${a.id}</td>
      <td><strong>${a.nombre} ${a.apellido}</strong></td>
      <td>${a.nacionalidad || '-'}</td>
      <td><span class="badge bg-secondary">${a.totalLibros}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="editar(${a.id})"><i class="bi bi-pencil"></i></button>
        ${usuario && usuario.rol === 'ADMIN'
          ? `<button class="btn btn-sm btn-outline-danger" onclick="eliminar(${a.id}, '${(a.nombre+' '+a.apellido).replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button>` : ''}
      </td>
    </tr>`).join('');
}

document.getElementById('btn-nuevo').addEventListener('click', () => abrirModal(null));

window.editar = async (id) => {
  showSpinner();
  try {
    const res = await AutorService.buscarPorId(id);
    abrirModal(res.data);
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
};

window.eliminar = async (id, nombre) => {
  if (!await confirmDelete(nombre)) return;
  showSpinner();
  try {
    await AutorService.eliminar(id);
    showToast('Autor eliminado');
    cargar();
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
};

function abrirModal(autor) {
  const modalId = 'modal-autor';
  const existing = document.getElementById(modalId);
  if (existing) existing.remove();

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal fade" id="${modalId}" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">${autor ? 'Editar Autor' : 'Nuevo Autor'}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="form-autor" novalidate>
              <div class="mb-3">
                <label class="form-label">Nombre *</label>
                <input type="text" class="form-control" id="aut-nombre" value="${autor ? autor.nombre : ''}">
              </div>
              <div class="mb-3">
                <label class="form-label">Apellido *</label>
                <input type="text" class="form-control" id="aut-apellido" value="${autor ? autor.apellido : ''}">
              </div>
              <div class="mb-3">
                <label class="form-label">Nacionalidad</label>
                <input type="text" class="form-control" id="aut-nacionalidad" value="${autor ? (autor.nacionalidad || '') : ''}">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btn-guardar-autor">Guardar</button>
          </div>
        </div>
      </div>
    </div>`);

  const modalEl = document.getElementById(modalId);
  const modal = new bootstrap.Modal(modalEl);
  modal.show();
  modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());

  document.getElementById('btn-guardar-autor').addEventListener('click', async () => {
    Validators.clearAllErrors('form-autor');
    const nombre = document.getElementById('aut-nombre').value;
    const apellido = document.getElementById('aut-apellido').value;

    const { valid, errors } = Validators.validateForm({
      'aut-nombre': [{ type: 'required', value: nombre, message: 'Nombre obligatorio' }],
      'aut-apellido': [{ type: 'required', value: apellido, message: 'Apellido obligatorio' }],
    });
    if (!valid) { Object.entries(errors).forEach(([f, m]) => Validators.showFieldError(f, m)); return; }

    const data = { nombre, apellido, nacionalidad: document.getElementById('aut-nacionalidad').value };
    showSpinner();
    try {
      if (autor) { await AutorService.actualizar(autor.id, data); showToast('Autor actualizado'); }
      else { await AutorService.crear(data); showToast('Autor creado'); }
      modal.hide();
      cargar();
    } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
  });
}
</script>
</body>
</html>
