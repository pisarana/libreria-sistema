<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Librería — Iniciar Sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    html, body { height: 100%; }
    .login-wrapper { display: flex; min-height: 100vh; }
    .login-left {
      width: 45%;
      background: #17212B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: white;
    }
    .login-left img { height: 72px; margin-bottom: 2rem; filter: brightness(0) invert(1); }
    .login-left h1 { font-family: 'Source Serif 4', Georgia, serif; font-size: 2.25rem; font-weight: 600; letter-spacing: -0.02em; text-align: center; margin-bottom: 0.75rem; }
    .login-left p { color: #B8C1C7; text-align: center; font-size: 1rem; max-width: 28ch; line-height: 1.6; }
    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #F5F7F8;
    }
    .login-card { width: 100%; max-width: 420px; background: white; border-radius: 10px; padding: 2.25rem; box-shadow: 0 8px 28px rgba(23,33,43,.08); border: 1px solid #D8DFE3; }
    .login-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .login-card p.subtitle { color: #566572; margin-bottom: 1.75rem; font-size: 0.9rem; }
    @media (max-width: 768px) {
      .login-left { display: none; }
      .login-right { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-left">
      <img src="/assets/img/logo.svg" alt="Logo" onerror="this.style.display='none'">
      <h1>Sistema de Gestión Interna</h1>
      <p>Administra tu librería universitaria de forma eficiente</p>
    </div>
    <div class="login-right">
      <div class="login-card">
        <h2>Bienvenido</h2>
        <p class="subtitle">Ingresa tus credenciales para continuar</p>
        <div id="login-error" class="alert alert-danger d-none mb-3" role="alert"></div>
        <form id="login-form" novalidate>
          <div class="mb-3">
            <label for="correo" class="form-label fw-semibold">Correo electrónico</label>
            <input type="email" class="form-control" id="correo" placeholder="usuario@correo.com" autocomplete="email">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Contraseña</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password">
              <button class="btn btn-outline-secondary" type="button" id="toggle-password" aria-label="Mostrar contraseña">
                <i class="bi bi-eye" id="eye-icon"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
          </button>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script>
    document.getElementById('toggle-password')?.addEventListener('click', () => {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
        document.getElementById('toggle-password').setAttribute('aria-label', 'Ocultar contraseña');
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
        document.getElementById('toggle-password').setAttribute('aria-label', 'Mostrar contraseña');
      }
    });
  </script>
</body>
</html>
