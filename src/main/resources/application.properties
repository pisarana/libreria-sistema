# ================================================================
#  LIBRERIA SISTEMA — application.properties
#  Configuración para desarrollo local con PostgreSQL
#  Para Supabase/Neon: reemplazar las 3 propiedades spring.datasource.*
# ================================================================

# ── Servidor ──────────────────────────────────────────────────
server.port=8080

# ── Base de datos: H2 local en memoria ───────────────────────────
spring.datasource.url=jdbc:h2:mem:libreria_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# none = el schema se gestiona manualmente con schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ── Inicialización SQL ────────────────────────────────────────
# Spring ejecuta schema.sql y luego data.sql al arrancar
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ── Sesión ────────────────────────────────────────────────────
# Tiempo de expiración: 8 horas (jornada laboral)
server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=LIBRERIA_SESSION
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.secure=false

# ── Mensajes de error ─────────────────────────────────────────
# No exponer stack trace en producción
server.error.include-message=never
server.error.include-stacktrace=never

# ── Logging ───────────────────────────────────────────────────
logging.level.com.libreria=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
