# ================================================================
#  LIBRERIA SISTEMA — Perfil PRODUCCIÓN (Railway / Render / Neon)
#  Las variables de entorno se configuran en el panel de Railway.
# ================================================================

# ── Servidor ──────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Base de datos: PostgreSQL (variables inyectadas por Railway) ──
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Inicialización SQL ────────────────────────────────────────
# La base de producción es persistente y ya contiene sus datos.
# No volver a ejecutar data.sql en cada despliegue: provocaría duplicados.
spring.sql.init.mode=never

# ── Sesión ────────────────────────────────────────────────────
server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=LIBRERIA_SESSION
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# ── Seguridad ─────────────────────────────────────────────────
server.error.include-message=never
server.error.include-stacktrace=never

# ── Logging ───────────────────────────────────────────────────
logging.level.com.libreria=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
