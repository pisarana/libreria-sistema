<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libros — Librería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div class="wrapper">
  <aside class="sidebar" id="sidebar-container"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar-container"></header>
    <main class="page-content">
      <div class="page-header">
        <h1><i class="bi bi-book me-2 text-primary"></i>Libros</h1>
        <button class="btn btn-primary" id="btn-nuevo">
          <i class="bi bi-plus-lg me-1"></i>Nuevo Libro
        </button>
      </div>
      <div class="card mb-3">
        <div class="card-body py-2">
          <div class="search-bar">
            <input type="text" class="form-control" id="input-busqueda" placeholder="Buscar por título...">
            <button class="btn btn-outline-secondary" id="btn-buscar" type="button" aria-label="Buscar libros"><i class="bi bi-search"></i></button>
            <button class="btn btn-outline-secondary" id="btn-limpiar">Limpiar</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>ID</th><th>Título</th><th>Autor</th><th>Categoría</th>
                  <th>ISBN</th><th>Precio</th><th>Stock</th><th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tabla-libros">
                <tr><td colspan="8" class="text-center py-4 text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="mt-3 d-flex justify-content-center" id="paginacion"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api, showToast, showSpinner, hideSpinner, confirmDelete, renderPagination, formatCurrency } from '/js/utils.js';
import { renderSidebar } from '/js/components/sidebar.js';
import { renderNavbar } from '/js/components/navbar.js';
import Validators from '/js/validators.js';
import LibroService from '/js/services/libroService.js';
import AutorService from '/js/services/autorService.js';
import CategoriaService from '/js/services/categoriaService.js';

let usuario = null;
let currentPage = 0;
let totalPages = 0;
let busqueda = '';
let autores = [];
let categorias = [];

(async () => {
  try {
    const res = await api('/api/auth/me');
    if (res && res.data) { usuario = res.data; sessionStorage.setItem('usuario', JSON.stringify(usuario)); }
  } catch(_) { window.location.href = '/index.html'; return; }

  renderSidebar(usuario);
  renderNavbar('Libros', usuario);

  [autores, categorias] = await Promise.all([
    AutorService.listar().then(r => r.data || []),
    CategoriaService.listar().then(r => r.data || [])
  ]);

  await cargarLibros();
})();

async function cargarLibros(page = 0) {
  showSpinner();
  try {
    const params = { page, size: 10 };
    if (busqueda) params.busqueda = busqueda;
    const res = await LibroService.listar(params);
    const pageData = res.data;
    // Keep the UI resilient if an older backend instance ignores `busqueda`.
    // The API remains the source of truth; this only narrows the current page
    // when a search term is active and the response is clearly unfiltered.
    const libros = busqueda
      ? (pageData.content || []).filter(l =>
          String(l.titulo || '').toLocaleLowerCase().includes(busqueda.toLocaleLowerCase()))
      : (pageData.content || []);
    currentPage = pageData.number;
    totalPages = pageData.totalPages;
    renderTabla(libros);
    renderPagination('paginacion', currentPage, totalPages, (p) => cargarLibros(p));
  } catch(err) {
    showToast('Error: ' + err.message, 'danger');
  } finally {
    hideSpinner();
  }
}

function renderTabla(libros) {
  const tbody = document.getElementById('tabla-libros');
  if (!libros || libros.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="bi bi-book"></i>Sin libros registrados</td></tr>';
    return;
  }
  tbody.innerHTML = libros.map(l => `
    <tr>
      <td>${l.id}</td>
      <td><strong>${l.titulo}</strong></td>
      <td>${l.autorNombre || '-'}</td>
      <td>${l.categoriaNombre || '-'}</td>
      <td><code>${l.isbn}</code></td>
      <td>${formatCurrency(l.precio)}</td>
      <td>${l.stock <= 5
        ? `<span class="badge bg-danger">${l.stock}</span>`
        : `<span class="badge bg-success">${l.stock}</span>`}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="editarLibro(${l.id})">
          <i class="bi bi-pencil"></i>
        </button>
        ${usuario && usuario.rol === 'ADMIN'
          ? `<button class="btn btn-sm btn-outline-danger" onclick="eliminarLibro(${l.id}, '${l.titulo.replace(/'/g,"\\'")}')">
               <i class="bi bi-trash"></i>
             </button>` : ''}
      </td>
    </tr>`).join('');
}

function aplicarBusqueda() {
  busqueda = document.getElementById('input-busqueda').value.trim();
  cargarLibros(0);
}
document.getElementById('btn-buscar').addEventListener('click', aplicarBusqueda);
document.getElementById('input-busqueda').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); aplicarBusqueda(); }
});
document.getElementById('btn-limpiar').addEventListener('click', () => {
  busqueda = '';
  document.getElementById('input-busqueda').value = '';
  cargarLibros(0);
});
document.getElementById('btn-nuevo').addEventListener('click', () => abrirModal(null));

window.editarLibro = async (id) => {
  showSpinner();
  try {
    const res = await LibroService.buscarPorId(id);
    abrirModal(res.data);
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
};

window.eliminarLibro = async (id, nombre) => {
  const ok = await confirmDelete(nombre);
  if (!ok) return;
  showSpinner();
  try {
    await LibroService.eliminar(id);
    showToast('Libro eliminado');
    cargarLibros(currentPage);
  } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
};

function abrirModal(libro) {
  const titulo = libro ? 'Editar Libro' : 'Nuevo Libro';
  const autorOptions = autores.map(a =>
    `<option value="${a.id}" ${libro && libro.autorNombre === a.nombre + ' ' + a.apellido ? 'selected' : ''}>${a.nombre} ${a.apellido}</option>`
  ).join('');
  const catOptions = categorias.map(c =>
    `<option value="${c.id}" ${libro && libro.categoriaId === c.id ? 'selected' : ''}>${c.nombre}</option>`
  ).join('');

  const body = `
    <form id="form-libro" novalidate>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Título *</label>
          <input type="text" class="form-control" id="lib-titulo" value="${libro ? libro.titulo : ''}">
        </div>
        <div class="col-md-6">
          <label class="form-label">ISBN *</label>
          <input type="text" class="form-control" id="lib-isbn" value="${libro ? libro.isbn : ''}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Precio</label>
          <input type="number" step="0.01" min="0" class="form-control" id="lib-precio" value="${libro ? libro.precio : ''}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Stock</label>
          <input type="number" min="0" class="form-control" id="lib-stock" value="${libro ? libro.stock : '0'}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Autor *</label>
          <select class="form-select" id="lib-autor"><option value="">Seleccionar...</option>${autorOptions}</select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Categoría *</label>
          <select class="form-select" id="lib-categoria"><option value="">Seleccionar...</option>${catOptions}</select>
        </div>
        <div class="col-12">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" id="lib-descripcion" rows="2">${libro ? (libro.descripcion || '') : ''}</textarea>
        </div>
      </div>
    </form>`;

  const modalId = 'modal-libro';
  const existing = document.getElementById(modalId);
  if (existing) existing.remove();

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal fade" id="${modalId}" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">${titulo}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">${body}</div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btn-guardar-libro">Guardar</button>
          </div>
        </div>
      </div>
    </div>`);

  const modalEl = document.getElementById(modalId);
  const modal = new bootstrap.Modal(modalEl);
  modal.show();
  modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());

  document.getElementById('btn-guardar-libro').addEventListener('click', async () => {
    Validators.clearAllErrors('form-libro');
    const tituloVal = document.getElementById('lib-titulo').value;
    const isbnVal = document.getElementById('lib-isbn').value;
    const autorId = document.getElementById('lib-autor').value;
    const categoriaId = document.getElementById('lib-categoria').value;

    const { valid, errors } = Validators.validateForm({
      'lib-titulo': [{ type: 'required', value: tituloVal, message: 'Título obligatorio' }],
      'lib-isbn': [
        { type: 'required', value: isbnVal, message: 'ISBN obligatorio' },
        { type: 'isbnFormat', value: isbnVal, message: 'ISBN inválido (10-20 dígitos)' }
      ],
      'lib-autor': [{ type: 'required', value: autorId, message: 'Seleccione un autor' }],
      'lib-categoria': [{ type: 'required', value: categoriaId, message: 'Seleccione una categoría' }],
    });

    if (!valid) {
      Object.entries(errors).forEach(([f, m]) => Validators.showFieldError(f, m));
      return;
    }

    const data = {
      titulo: tituloVal,
      isbn: isbnVal,
      precio: document.getElementById('lib-precio').value || null,
      stock: parseInt(document.getElementById('lib-stock').value) || 0,
      descripcion: document.getElementById('lib-descripcion').value,
      autorId: parseInt(autorId),
      categoriaId: parseInt(categoriaId),
    };

    showSpinner();
    try {
      if (libro) {
        await LibroService.actualizar(libro.id, data);
        showToast('Libro actualizado');
      } else {
        await LibroService.crear(data);
        showToast('Libro creado');
      }
      modal.hide();
      cargarLibros(currentPage);
    } catch(err) { showToast(err.message, 'danger'); } finally { hideSpinner(); }
  });
}
</script>
</body>
</html>
